name: Bug report
description: Report an issue with Skel editing or extension startup.
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Include the extension, VS Code, and skelc versions.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include a minimal Skel file, relevant settings, and reproduction steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include extension-host or language-server logs when applicable.
    validations:
      required: true
