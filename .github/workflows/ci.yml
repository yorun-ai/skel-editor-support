name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate editor support packages
        run: npm run check

      - name: Check out skelc
        uses: actions/checkout@v7
        with:
          repository: yorun-ai/skelc
          ref: v0.9.4
          path: .test/skelc

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: .test/skelc/go.mod
          cache-dependency-path: .test/skelc/go.sum

      - name: Build skelc language server
        working-directory: .test/skelc
        run: GOWORK=off go build -o "$RUNNER_TEMP/skelc" ./cmd/skelc

      - name: Test LSP integration
        env:
          SKELC_PATH: ${{ runner.temp }}/skelc
        run: npm run test:integration

      - name: Test Extension Host
        env:
          SKELC_PATH: ${{ runner.temp }}/skelc
        run: xvfb-run -a npm run test:extension
