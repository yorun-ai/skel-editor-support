name: Feature request
description: Propose an editor integration or syntax-highlighting improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - New highlighter integration
        - Shiki
        - TextMate grammar
        - Visual Studio Code
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the editor workflow that should improve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: server
    attributes:
      label: Language-server impact
      description: State whether the capability requires a coordinated skelc change.
