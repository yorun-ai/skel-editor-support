name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate editor support packages
        run: npm run check

      - name: Check out skelc
        uses: actions/checkout@v7
        with:
          repository: yorun-ai/skelc
          ref: v0.9.4
          path: .test/skelc

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: .test/skelc/go.mod
          cache-dependency-path: .test/skelc/go.sum

      - name: Build skelc language server
        working-directory: .test/skelc
        run: GOWORK=off go build -o "$RUNNER_TEMP/skelc" ./cmd/skelc

      - name: Test LSP integration
        env:
          SKELC_PATH: ${{ runner.temp }}/skelc
        run: npm run test:integration

      - name: Test Extension Host
        env:
          SKELC_PATH: ${{ runner.temp }}/skelc
        run: xvfb-run -a npm run test:extension

  highlight-compatibility:
    name: Highlight compatibility (Node ${{ matrix.node-version }}, ${{ matrix.peer-set }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 20
            peer-set: locked
          - node-version: 24
            peer-set: locked
          - node-version: 24
            peer-set: latest-compatible
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install dependencies with the repository Node.js version
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Select compatibility Node.js version
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install latest compatible highlighter peers
        if: matrix.peer-set == 'latest-compatible'
        run: >-
          npm install --no-save --package-lock=false
          @codemirror/language@^6
          @wooorm/starry-night@^3
          highlight.js@^11
          lowlight@^3
          monaco-editor@^0.56
          prismjs@^1
          refractor@^5
          shiki@^4

      - name: Validate syntax-highlighting consumers
        run: npm run check --workspace @yorun-ai/skel-highlight
