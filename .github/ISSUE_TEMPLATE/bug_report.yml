name: Bug report
description: Report an issue with a Skel editor integration or highlighter.
title: "[Bug]: "
labels: [bug]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Shiki
        - TextMate grammar
        - Visual Studio Code
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Include relevant package, editor, highlighter, and skelc versions.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include minimal Skel source, relevant settings or code, and reproduction steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include extension-host or language-server logs when applicable.
    validations:
      required: true
